# ~/.tmux.conf
# Ergonomic and portable tmux configuration.

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g repeat-time 500

# Enable vi mode and mouse support
setw -g mode-keys vi
set -g status-keys vi
set -g mouse on

# Status bar styling
set -g status on
set -g status-interval 2
set -g status-style bg=colour236,fg=colour250
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[bg=colour34,fg=colour232,bold] #S #[fg=colour34,bg=colour236,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=colour250,bg=colour236]#(whoami)@#H #[fg=colour244] #[fg=colour250]#(date +'%Y-%m-%d %H:%M') "
set -g window-status-current-format "#[fg=colour234,bg=colour152,bold] #I:#W #[fg=colour152,bg=colour236]"
set -g window-status-format "#[fg=colour250,bg=colour236] #I:#W "
set -g window-status-separator ""

# Behavior
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 20000
set -g escape-time 0
set -g automatic-rename on
set -g allow-rename off
set -g set-clipboard on
set -g default-terminal "tmux-256color"
set -g default-shell /bin/zsh

# Split navigation
bind | split-window -h
bind - split-window -v
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind q display-message "Pane #P: #{pane_title}"

# Window management
bind c new-window
bind n next-window
bind p previous-window
bind & kill-window
bind , command-prompt -I "#W" "rename-window %%"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Copy mode enhancements
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-c send -X copy-selection-and-cancel
